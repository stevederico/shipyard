name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # yagni: -S error until the factory.sh robustness pass clears the warning backlog
      - run: shellcheck -S error factory.sh lib/*.sh test/*.sh
      - run: bash test/run.sh
